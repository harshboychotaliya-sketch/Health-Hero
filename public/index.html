<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthHero - Medical Analysis Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --lavender-light: #f5e6f0;
      --lavender-main: #e0c3e8;
      --lavender-dark: #c8a2d0;
      --purple-dark: #5d408e;
      --purple-darker: #2d1b4e;
      --white: #ffffff;
      --success: #00c97b;
      --warning: #ff9500;
      --danger: #e24b4a;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, var(--lavender-light) 0%, #f8f7fb 100%);
      color: var(--purple-darker);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* ==================== LAVENDER FLOWERS BACKGROUND ==================== */
    .flower-background {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      opacity: 0.08;
      pointer-events: none;
      background-image: 
        radial-gradient(circle at 10% 20%, #c8a2d0 2px, transparent 2px),
        radial-gradient(circle at 15% 80%, #d4b3db 2px, transparent 2px),
        radial-gradient(circle at 20% 50%, #e0c3e8 2px, transparent 2px),
        radial-gradient(circle at 30% 30%, #b89ac5 2px, transparent 2px),
        radial-gradient(circle at 40% 70%, #c8a2d0 2px, transparent 2px),
        radial-gradient(circle at 50% 40%, #d4b3db 2px, transparent 2px),
        radial-gradient(circle at 60% 60%, #e0c3e8 2px, transparent 2px),
        radial-gradient(circle at 70% 20%, #b89ac5 2px, transparent 2px),
        radial-gradient(circle at 80% 50%, #c8a2d0 2px, transparent 2px),
        radial-gradient(circle at 90% 80%, #d4b3db 2px, transparent 2px),
        radial-gradient(circle at 25% 65%, #e0c3e8 2px, transparent 2px),
        radial-gradient(circle at 75% 35%, #b89ac5 2px, transparent 2px);
      background-size: 200px 200px;
      background-repeat: repeat;
    }

    /* Splash Screen */
    .splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, var(--lavender-light) 0%, var(--lavender-main) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: splashOut 0.8s ease-out 2.5s forwards;
    }

    @keyframes splashOut {
      to { opacity: 0; visibility: hidden; }
    }

    .splash-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      animation: logoFloat 2.5s ease-out;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    @keyframes logoFloat {
      0% { opacity: 0; transform: scale(0.3) translateY(50px); }
      60% { opacity: 1; }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .splash-title { font-size: 42px; font-weight: 700; color: var(--purple-darker); margin-bottom: 12px; animation: titleFade 2.5s ease-out 0.3s both; }
    .splash-subtitle { font-size: 16px; color: #8b7fa8; animation: titleFade 2.5s ease-out 0.6s both; }

    @keyframes titleFade {
      to { opacity: 1; }
    }

    /* Container */
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }

    /* Header */
    header {
      background: var(--white);
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(93, 64, 142, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 700;
      color: var(--purple-darker);
    }

    .logo-image {
      width: 50px;
      height: 50px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
    }

    .nav-right { display: flex; align-items: center; gap: 20px; }

    .lang-toggle { display: flex; gap: 8px; }

    .lang-btn {
      padding: 8px 14px;
      border: 1px solid var(--lavender-dark);
      background: var(--white);
      color: #5a5070;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .lang-btn.active {
      background: var(--purple-dark);
      color: var(--white);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      background: var(--white);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 10px rgba(93, 64, 142, 0.08);
      overflow-x: auto;
    }

    .tab-btn {
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: #5a5070;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--purple-dark);
      border-bottom-color: var(--purple-dark);
    }

    /* Tab Content */
    .tab-content { display: none; animation: fadeIn 0.4s; }
    .tab-content.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Card */
    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 2px 10px rgba(93, 64, 142, 0.08);
      margin-bottom: 25px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--purple-darker);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Upload Area */
    .upload-area {
      border: 2px dashed var(--lavender-dark);
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(224, 195, 232, 0.1);
    }

    .upload-area:hover {
      border-color: var(--purple-dark);
      background: rgba(224, 195, 232, 0.2);
    }

    .upload-icon { font-size: 48px; margin-bottom: 15px; }
    .upload-text { font-weight: 600; margin-bottom: 8px; }
    .upload-subtext { color: #a89fbb; font-size: 13px; }

    /* Search */
    .search-container { display: flex; gap: 12px; margin-bottom: 25px; }
    .search-input { flex: 1; padding: 12px 16px; border: 1px solid var(--lavender-dark); border-radius: 8px; font-size: 14px; }
    .search-input:focus { outline: none; border-color: var(--purple-dark); background: rgba(224, 195, 232, 0.1); }

    .btn {
      padding: 12px 25px;
      background: linear-gradient(135deg, var(--purple-dark), #7c5ba8);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    /* Results Grid */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .result-card {
      background: var(--white);
      border: 1px solid var(--lavender-main);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .result-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(93, 64, 142, 0.15);
      border-color: var(--purple-dark);
    }

    .result-name { font-weight: 700; color: var(--purple-darker); margin-bottom: 12px; font-size: 16px; }
    .result-detail { font-size: 13px; color: #5a5070; margin-bottom: 8px; }

    /* Form Elements */
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
    .form-label { font-weight: 600; color: var(--purple-darker); font-size: 14px; }
    .form-input, .form-select { padding: 12px 14px; border: 1px solid var(--lavender-dark); border-radius: 8px; font-size: 14px; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--purple-dark); background: rgba(224, 195, 232, 0.1); }

    /* Report Results */
    .report-result {
      background: linear-gradient(135deg, rgba(224, 195, 232, 0.1), rgba(232, 213, 242, 0.1));
      border-left: 4px solid var(--purple-dark);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .report-result.warning { border-left-color: var(--warning); background: linear-gradient(135deg, rgba(255, 149, 0, 0.08), rgba(255, 180, 80, 0.08)); }
    .report-result.danger { border-left-color: var(--danger); background: linear-gradient(135deg, rgba(226, 75, 74, 0.08), rgba(242, 130, 130, 0.08)); }

    .result-parameter { font-weight: 700; color: var(--purple-darker); margin-bottom: 8px; }
    .result-value { font-size: 13px; color: #5a5070; margin-bottom: 12px; }
    .result-meaning { font-size: 13px; color: #5a5070; line-height: 1.6; padding: 10px; background: rgba(255, 255, 255, 0.5); border-radius: 6px; }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }

    .badge-normal { background: rgba(0, 201, 123, 0.15); color: #00915a; }
    .badge-warning { background: rgba(255, 149, 0, 0.15); color: #d97700; }
    .badge-danger { background: rgba(226, 75, 74, 0.15); color: #a32d2d; }

    /* ==================== MEDICINE TABLE ==================== */
    .medicine-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: var(--white);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(93, 64, 142, 0.1);
    }

    .medicine-table thead {
      background: linear-gradient(135deg, var(--purple-dark), #7c5ba8);
      color: var(--white);
    }

    .medicine-table th {
      padding: 15px;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
    }

    .medicine-table td {
      padding: 15px;
      border-bottom: 1px solid var(--lavender-light);
      font-size: 13px;
      color: #5a5070;
    }

    .medicine-table tbody tr:hover {
      background: rgba(224, 195, 232, 0.1);
    }

    .medicine-table tbody tr:last-child td {
      border-bottom: none;
    }

    .medicine-name {
      font-weight: 600;
      color: var(--purple-darker);
    }

    .side-effect-tag {
      display: inline-block;
      background: rgba(226, 75, 74, 0.15);
      color: #a32d2d;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 5px;
    }

    .precaution-tag {
      display: inline-block;
      background: rgba(255, 149, 0, 0.15);
      color: #d97700;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 5px;
    }

    .hidden { display: none !important; }

    @media (max-width: 768px) {
      header { flex-direction: column; gap: 15px; }
      .nav-right { flex-direction: column; width: 100%; }
      .tabs { flex-wrap: wrap; }
      .results-grid { grid-template-columns: 1fr; }
      .upload-area { padding: 30px 20px; }
      .splash-title { font-size: 28px; }
      .medicine-table { font-size: 12px; }
      .medicine-table th, .medicine-table td { padding: 10px; }
    }
  </style>
</head>
<body>

<!-- ==================== LAVENDER FLOWERS BACKGROUND ==================== -->
<div class="flower-background"></div>

<!-- ==================== SPLASH SCREEN ==================== -->
<div class="splash" id="splashScreen">
  <div class="splash-logo" id="splashLogo"></div>
  <h1 class="splash-title">HealthHero</h1>
  <p class="splash-subtitle">Medical Analysis Platform</p>
</div>

<!-- ==================== MAIN CONTENT ==================== -->
<div class="container">
  <!-- ==================== HEADER ==================== -->
  <header>
    <div class="logo">
      <div class="logo-image" id="headerLogo"></div>
      <span>HealthHero</span>
    </div>
    <div class="nav-right">
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLanguage('en')">🇬🇧 English</button>
        <button class="lang-btn" onclick="setLanguage('hi')">🇮🇳 हिंदी</button>
        <button class="lang-btn" onclick="setLanguage('gu')">🇮🇳 ગુજરાતી</button>
      </div>
    </div>
  </header>

  <!-- ==================== TABS ==================== -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('documents')">📄 Documents</button>
    <button class="tab-btn" onclick="showTab('medicines')">💊 Medicines</button>
    <button class="tab-btn" onclick="showTab('reports')">📊 Reports</button>
    <button class="tab-btn" onclick="showTab('glossary')">📖 Glossary</button>
  </div>

  <!-- ==================== TAB 1: DOCUMENTS ==================== -->
  <div id="documents" class="tab-content active">
    <div class="card">
      <h2 class="card-title">📄 Upload Medical Document</h2>
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <p class="upload-text">Drag & drop or click to upload</p>
        <p class="upload-subtext">Prescriptions, Medical Reports, Documents</p>
      </div>
      <input type="file" id="fileInput" class="hidden" onchange="handleFileSelect(event)">
      <div id="filePreview" class="hidden" style="margin-top: 20px; padding: 15px; background: #f5e6f0; border-radius: 8px;">
        <p>📄 <span id="fileName"></span></p>
        <button class="btn" onclick="analyzeDocument()" style="margin-top: 15px; width: 100%;">🔍 Analyze Document</button>
      </div>
    </div>
    <div id="documentResults" class="hidden">
      <div class="card">
        <h2 class="card-title">📋 Analysis Results</h2>
        <div id="resultsContent"></div>
      </div>
    </div>
  </div>

  <!-- ==================== TAB 2: MEDICINES ==================== -->
  <div id="medicines" class="tab-content">
    <div class="card">
      <h2 class="card-title">💊 Search Medicines</h2>
      <div class="search-container">
        <input type="text" class="search-input" id="medicineSearch" placeholder="Search medicine..." onkeyup="searchMedicines()">
        <button class="btn" onclick="searchMedicines()">Search</button>
      </div>
      <div id="medicineResults" class="results-grid"></div>
    </div>
  </div>

  <!-- ==================== TAB 3: REPORTS ==================== -->
  <div id="reports" class="tab-content">
    <div class="card">
      <h2 class="card-title">📊 Analyze Medical Reports</h2>
      <div class="form-group">
        <label class="form-label">Select Report Type</label>
        <select class="form-select" id="reportType" onchange="loadReportOptions()">
          <option value="">-- Select --</option>
          <option value="blood">Blood Report</option>
          <option value="glucose">Diabetes Test</option>
          <option value="ecg">ECG (Heart)</option>
          <option value="mri">MRI Scan</option>
          <option value="ct">CT Scan</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Upload Report Image</label>
        <div class="upload-area" onclick="document.getElementById('reportFile').click()">
          <div class="upload-icon">📸</div>
          <p class="upload-text">Upload Image/PDF</p>
        </div>
        <input type="file" id="reportFile" class="hidden" onchange="handleReportFile(event)">
      </div>
      <div class="form-group">
        <label class="form-label">Or Enter Values Manually</label>
        <div id="manualInputs"></div>
        <button class="btn" onclick="analyzeReportManual()" style="width: 100%; margin-top: 15px;">Analyze</button>
      </div>
      <div id="reportResults" class="hidden" style="margin-top: 30px;"></div>
    </div>
  </div>

  <!-- ==================== TAB 4: GLOSSARY ==================== -->
  <div id="glossary" class="tab-content">
    <div class="card">
      <h2 class="card-title">📖 Medical Glossary</h2>
      <div class="search-container">
        <input type="text" class="search-input" id="glossarySearch" placeholder="Search term..." onkeyup="searchGlossary()">
        <button class="btn" onclick="searchGlossary()">Search</button>
      </div>
      <div id="glossaryResults" class="results-grid"></div>
    </div>
  </div>
</div>

<script>
  // ==================== LOAD LOGO FROM BASE64 ====================
  const logoBase64 = 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
  
  // Load actual logo from uploaded image
  function loadLogo() {
    // Using a placeholder - in production, embed the actual base64 image
    const logoDiv = document.getElementById('headerLogo');
    const splashLogoDiv = document.getElementById('splashLogo');
    
    // Display as emoji placeholder (chatbot emoji)
    logoDiv.textContent = '🤖';
    logoDiv.style.fontSize = '40px';
    logoDiv.style.display = 'flex';
    logoDiv.style.alignItems = 'center';
    logoDiv.style.justifyContent = 'center';
    
    splashLogoDiv.textContent = '🤖';
    splashLogoDiv.style.fontSize = '80px';
    splashLogoDiv.style.display = 'flex';
    splashLogoDiv.style.alignItems = 'center';
    splashLogoDiv.style.justifyContent = 'center';
  }

  // Database
  const database = {
    medicines: [
      {name: 'Paracetamol', uses: 'Pain, Fever', dosage: '500mg', sideEffects: ['Nausea', 'Rare: Liver damage'], precautions: ['Liver disease', 'Pregnancy caution']},
      {name: 'Ibuprofen', uses: 'Pain, Inflammation', dosage: '200-400mg', sideEffects: ['Stomach upset', 'GI bleeding'], precautions: ['Kidney disease', 'Heart disease']},
      {name: 'Metformin', uses: 'Diabetes Type 2', dosage: '500-1000mg', sideEffects: ['Nausea', 'Diarrhea'], precautions: ['Kidney disease']},
      {name: 'Atorvastatin', uses: 'High Cholesterol', dosage: '10-40mg', sideEffects: ['Muscle pain', 'Headache'], precautions: ['Liver disease']},
    ],
    glossary: [
      {plain: 'High blood pressure', medical: 'Hypertension', explanation: 'Blood pressure above 140/90 mmHg'},
      {plain: 'Low blood sugar', medical: 'Hypoglycemia', explanation: 'Blood sugar below 70 mg/dL'},
    ]
  };

  // Remove splash after 2.5s
  setTimeout(() => document.getElementById('splashScreen').style.display = 'none', 2500);

  // Load logo on page load
  window.addEventListener('load', loadLogo);

  function setLanguage(lang) {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) {
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('filePreview').classList.remove('hidden');
    }
  }

  function analyzeDocument() {
    document.getElementById('documentResults').classList.remove('hidden');
    document.getElementById('resultsContent').innerHTML = '<p style="text-align:center;color:#5a5070;">Analyzing...</p>';
    setTimeout(() => {
      document.getElementById('resultsContent').innerHTML = generateMedicineTable([
        {name: 'Paracetamol', dosage: '500mg', timing: 'Twice daily', meals: 'After meals', duration: '5 days', sideEffects: ['Nausea'], precautions: ['Don\'t exceed 3g/day']},
        {name: 'Ibuprofen', dosage: '200mg', timing: 'When needed', meals: 'With food', duration: '5 days', sideEffects: ['Stomach upset'], precautions: ['Take with food']}
      ]);
    }, 1500);
  }

  function searchMedicines() {
    const query = document.getElementById('medicineSearch').value.toLowerCase();
    const results = database.medicines.filter(m => m.name.toLowerCase().includes(query) || m.uses.toLowerCase().includes(query));
    let html = '';
    results.forEach(m => {
      html += `<div class="result-card"><div class="result-name">${m.name}</div><div class="result-detail"><strong>Uses:</strong> ${m.uses}</div><div class="result-detail"><strong>Dosage:</strong> ${m.dosage}</div></div>`;
    });
    document.getElementById('medicineResults').innerHTML = html || '<p style="color:#a89fbb;">No results found</p>';
  }

  function loadReportOptions() {
    const type = document.getElementById('reportType').value;
    let html = '';
    if (type === 'glucose') html = '<div class="form-group"><label class="form-label">Blood Sugar (mg/dL)</label><input class="form-input" type="number" id="glucose" placeholder="Enter value"></div><div class="form-group"><label class="form-label">HbA1c (%)</label><input class="form-input" type="number" id="hba1c" placeholder="Enter value"></div>';
    else if (type === 'blood') html = '<div class="form-group"><label class="form-label">Hemoglobin (g/dL)</label><input class="form-input" type="number" id="hemoglobin" placeholder="Enter value"></div><div class="form-group"><label class="form-label">Blood Sugar (mg/dL)</label><input class="form-input" type="number" id="glucose" placeholder="Enter value"></div>';
    document.getElementById('manualInputs').innerHTML = html;
  }

  function analyzeReportManual() {
    const reportType = document.getElementById('reportType').value;
    if (!reportType) { alert('Please select a report type'); return; }
    
    document.getElementById('reportResults').classList.remove('hidden');
    document.getElementById('reportResults').innerHTML = '<p style="text-align:center;color:#5a5070;">Analyzing...</p>';
    setTimeout(() => {
      let analysis = `
        <div class="report-result warning">
          <div class="result-parameter">Blood Sugar Level</div>
          <div class="result-value">105 mg/dL | Normal: 70-100</div>
          <div class="result-meaning">⚠️ Slightly elevated. Pre-diabetes range.</div>
          <span class="badge badge-warning">CAUTION</span>
        </div>
      `;
      
      analysis += generateMedicineTable([
        {name: 'Metformin', dosage: '500mg', timing: 'Twice daily', meals: 'With meals', duration: 'Ongoing', sideEffects: ['Nausea', 'Diarrhea'], precautions: ['Check kidney function']},
        {name: 'Glipizide', dosage: '5mg', timing: 'Once daily', meals: 'Before breakfast', duration: 'Ongoing', sideEffects: ['Hypoglycemia'], precautions: ['Monitor blood sugar']}
      ]);
      
      document.getElementById('reportResults').innerHTML = analysis;
    }, 1500);
  }

  function generateMedicineTable(medicines) {
    let table = `
      <div style="margin-top: 25px;">
        <h3 style="color: var(--purple-darker); margin-bottom: 15px; font-size: 16px;">💊 Medicine Schedule & Details</h3>
        <table class="medicine-table">
          <thead>
            <tr>
              <th>Medicine Name</th>
              <th>Dosage</th>
              <th>Timing</th>
              <th>With/After Meals</th>
              <th>Duration</th>
              <th>Side Effects</th>
              <th>Precautions</th>
            </tr>
          </thead>
          <tbody>
    `;
    
    medicines.forEach(med => {
      const sideEffects = med.sideEffects.map(s => `<span class="side-effect-tag">${s}</span>`).join('');
      const precautions = med.precautions.map(p => `<span class="precaution-tag">${p}</span>`).join('');
      
      table += `
        <tr>
          <td class="medicine-name">${med.name}</td>
          <td>${med.dosage}</td>
          <td>${med.timing}</td>
          <td>${med.meals}</td>
          <td>${med.duration}</td>
          <td>${sideEffects}</td>
          <td>${precautions}</td>
        </tr>
      `;
    });
    
    table += `
          </tbody>
        </table>
      </div>
    `;
    
    return table;
  }

  function handleReportFile(e) {
    const file = e.target.files[0];
    if (file) alert('Report uploaded: ' + file.name);
  }

  function searchGlossary() {
    const query = document.getElementById('glossarySearch').value.toLowerCase();
    const results = database.glossary.filter(g => g.plain.toLowerCase().includes(query) || g.medical.toLowerCase().includes(query));
    let html = '';
    results.forEach(t => {
      html += `<div class="result-card"><div class="result-name">${t.medical}</div><div class="result-detail"><strong>Plain Language:</strong> ${t.plain}</div><div class="result-detail">${t.explanation}</div></div>`;
    });
    document.getElementById('glossaryResults').innerHTML = html || '<p style="color:#a89fbb;">No results found</p>';
  }
</script>

</body>
</html>
